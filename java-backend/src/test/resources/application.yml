server:
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:ai_recruitment_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
